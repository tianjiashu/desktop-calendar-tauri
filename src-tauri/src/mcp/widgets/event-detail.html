<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline';
                 script-src 'self' 'unsafe-inline' https://esm.sh;
                 connect-src 'self' https://esm.sh;
                 img-src 'self' data: blob:;
                 style-src 'self' 'unsafe-inline';">
  <style>
    :root {
      color-scheme: light dark;
      --bg: light-dark(#ffffff, #1a1a2e);
      --fg: light-dark(#1f2937, #e5e7eb);
      --title-color: light-dark(#111827, #f9fafb);
      --label-color: light-dark(#6B7280, #9CA3AF);
      --border-color: light-dark(rgba(0,0,0,0.06), rgba(255,255,255,0.08));
      --loading-color: light-dark(#6B7280, #9CA3AF);
      --error-color: light-dark(#EF4444, #FCA5A5);
    }
    html[data-theme="light"] { color-scheme: light; }
    html[data-theme="dark"]  { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--fg);
      padding: 16px;
    }
    .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--title-color); }
    .detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; }
    .detail-label { width: 70px; color: var(--label-color); flex-shrink: 0; }
    .detail-value { flex: 1; color: var(--fg); word-break: break-word; }
    .detail-link { color: #3B82F6; text-decoration: none; }
    .detail-link:hover { text-decoration: underline; }
    .loading { text-align: center; padding: 24px; color: var(--loading-color); }
    .error { color: var(--error-color); text-align: center; padding: 16px; font-size: 13px; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .status-confirmed { background: #D1FAE5; color: #065F46; }
    .status-cancelled { background: #FEE2E2; color: #991B1B; }
    .status-tentative { background: #FEF3C7; color: #92400E; }
  </style>
</head>
<body>
  <div id="root">
    <div class="detail-title">📋 事件详情</div>
    <div id="content" class="loading">加载中...</div>
  </div>
  <script type="module">
    import { App } from 'https://esm.sh/@modelcontextprotocol/ext-apps@1/app-with-deps';

    const app = new App({
      name: 'event-detail',
      version: '1.0.0',
      autoResize: true,
    });

    const content = document.getElementById('content');

    // Host pushes tool result via ontoolresult
    app.ontoolresult = (result) => {
      if (result?.structuredContent) {
        render(result.structuredContent);
      } else {
        content.innerHTML = '<div class="error">未找到事件数据</div>';
      }
    };

    function applyTheme(theme) {
      if (!theme) return;
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    }
    app.onhostcontextchanged = (ctx) => applyTheme(ctx?.theme);

    await app.connect();
    applyTheme(app.hostContext?.theme);

    function render(ev) {
      try {
        content.innerHTML = '';
        addTextRow('标题', ev.title || '-');
        addTextRow('时间', fmtRng(ev.start_time, ev.end_time));
        addTextRow('类型', tl(ev.event_type));
        addStatusRow('状态', ev.status);
        addTextRow('地点', ev.location || '-');
        if (ev.description) addTextRow('描述', ev.description);
        if (ev.url) addLinkRow('链接', ev.url);
      } catch (e) {
        content.innerHTML = '<div class="error">数据解析失败</div>';
        app.log('error', 'Render error: ' + e.message);
      }
    }

    function addTextRow(label, value) {
      addRow(label, document.createTextNode(String(value)));
    }

    function addStatusRow(label, status) {
      const safeStatus = ['confirmed', 'cancelled', 'tentative'].includes(status) ? status : 'confirmed';
      const badge = document.createElement('span');
      badge.className = 'status-badge status-' + safeStatus;
      badge.textContent = sl(safeStatus);
      addRow(label, badge);
    }

    function addLinkRow(label, url) {
      const value = String(url);
      if (!isSafeUrl(value)) {
        addTextRow(label, value);
        return;
      }
      const link = document.createElement('a');
      link.className = 'detail-link';
      link.href = value;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.textContent = value;
      addRow(label, link);
    }

    function addRow(label, valueNode) {
      const row = document.createElement('div');
      row.className = 'detail-row';
      const labelEl = document.createElement('div');
      labelEl.className = 'detail-label';
      labelEl.textContent = label;
      const valueEl = document.createElement('div');
      valueEl.className = 'detail-value';
      valueEl.appendChild(valueNode);
      row.append(labelEl, valueEl);
      content.appendChild(row);
    }

    function fmtRng(s, e) { return fmt(s) + ' — ' + fmt(e); }
    function fmt(ms) { if (!ms) return '--:--'; const d = new Date(ms); return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' + p(d.getHours()) + ':' + p(d.getMinutes()); }
    function p(n) { return n < 10 ? '0' + n : '' + n; }
    function isSafeUrl(value) {
      try {
        const parsed = new URL(value);
        return ['http:', 'https:', 'mailto:'].includes(parsed.protocol);
      } catch {
        return false;
      }
    }
    function tl(t) { const m = { interview: '面试', meeting: '会议', reminder: '提醒', deadline: '截止', default: '其他' }; return m[t] || t || '-'; }
    function sl(s) { const m = { confirmed: '已确认', cancelled: '已取消', tentative: '待定' }; return m[s] || s || '已确认'; }
  </script>
</body>
</html>
