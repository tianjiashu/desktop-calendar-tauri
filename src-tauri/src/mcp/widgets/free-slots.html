<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline';
                 script-src 'self' 'unsafe-inline' https://esm.sh;
                 connect-src 'self' https://esm.sh;
                 img-src 'self' data: blob:;
                 style-src 'self' 'unsafe-inline';">
  <style>
    :root {
      color-scheme: light dark;
      --bg: light-dark(#ffffff, #1a1a2e);
      --fg: light-dark(#1f2937, #e5e7eb);
      --title-color: light-dark(#111827, #f9fafb);
      --card-bg: light-dark(#ECFDF5, #064E3B);
      --card-border: light-dark(#A7F3D0, #059669);
      --card-time: light-dark(#065F46, #D1FAE5);
      --card-dur: light-dark(#6B7280, #9CA3AF);
      --empty-color: light-dark(#9CA3AF, #6B7280);
      --loading-color: light-dark(#6B7280, #9CA3AF);
      --error-color: light-dark(#EF4444, #FCA5A5);
    }
    html[data-theme="light"] { color-scheme: light; }
    html[data-theme="dark"]  { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 16px;
    }
    .slot-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--title-color); }
    .slot-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .slot-card:hover { box-shadow: 0 2px 12px rgba(16,185,129,0.2); transform: translateY(-1px); }
    .slot-card:focus-visible { outline: 2px solid #10B981; outline-offset: 2px; }
    .slot-time { font-size: 14px; font-weight: 600; color: var(--card-time); }
    .slot-duration { font-size: 12px; color: var(--card-dur); margin-top: 2px; }
    .empty-state { text-align: center; padding: 32px; color: var(--empty-color); font-size: 14px; }
    .loading { text-align: center; padding: 24px; color: var(--loading-color); }
    .error { color: var(--error-color); text-align: center; padding: 16px; font-size: 13px; }
  </style>
</head>
<body>
  <div id="root">
    <div id="title" class="slot-title">空闲时间段</div>
    <div id="content" class="loading">加载中...</div>
  </div>
  <script type="module">
    import { App } from 'https://esm.sh/@modelcontextprotocol/ext-apps@1/app-with-deps';

    const app = new App({
      name: 'free-slots',
      version: '1.0.0',
      autoResize: true,
    });

    const title = document.getElementById('title');
    const content = document.getElementById('content');
    let lastInput = {};

    app.ontoolinput = (input) => {
      lastInput = input || {};
      updateTitle(lastInput);
    };

    app.ontoolresult = (result) => {
      if (result?.structuredContent?.free_slots) {
        render(result.structuredContent);
      } else {
        renderEmpty('没有可用的空闲时间段');
      }
    };

    app.onhostcontextchanged = (ctx) => applyTheme(ctx?.theme);

    await app.connect();
    applyTheme(app.hostContext?.theme);

    function render(data) {
      try {
        const slots = data.free_slots || [];
        updateTitle(data.query || lastInput);

        if (!slots.length) {
          renderEmpty('当前日期没有可用的空闲时间段');
          return;
        }

        content.textContent = '';
        for (const slot of slots) {
          content.appendChild(createSlotCard(slot));
        }
      } catch (e) {
        renderError('数据解析失败');
        logError('Render error: ' + e.message);
      }
    }

    function createSlotCard(slot) {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'slot-card';
      card.addEventListener('click', () => fillCreateEventMessage(slot));

      const dur = Math.round((slot.end_time - slot.start_time) / 60000);

      const timeEl = document.createElement('div');
      timeEl.className = 'slot-time';
      timeEl.textContent = fmt(slot.start_time) + ' - ' + fmt(slot.end_time);

      const durationEl = document.createElement('div');
      durationEl.className = 'slot-duration';
      durationEl.textContent = '约 ' + dur + ' 分钟';

      card.append(timeEl, durationEl);
      return card;
    }

    async function fillCreateEventMessage(slot) {
      const text = '帮我在 ' + fmtDateTime(slot.start_time) + ' 到 ' + fmtDateTime(slot.end_time) + ' 创建一个日程，标题是：';

      try {
        if (typeof app.sendMessage !== 'function') {
          renderError('当前 host 不支持回填消息');
          return;
        }

        await app.sendMessage({
          role: 'user',
          content: [{ type: 'text', text }],
          _meta: { 'codebuddy.ai/sendMessageMode': 'fill' },
        });
      } catch (e) {
        renderError('无法回填创建日程消息');
        logError('Fill create event message failed: ' + e.message);
      }
    }

    function updateTitle(query) {
      if (query?.date) {
        const duration = query.duration_minutes ? ' · ' + query.duration_minutes + '分钟' : '';
        title.textContent = '空闲时间段 ' + fmtDate(query.date) + duration;
        return;
      }
      title.textContent = '空闲时间段';
    }

    function renderEmpty(message) {
      content.textContent = '';
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = message;
      content.appendChild(empty);
    }

    function renderError(message) {
      content.textContent = '';
      const error = document.createElement('div');
      error.className = 'error';
      error.textContent = message;
      content.appendChild(error);
    }

    function applyTheme(theme) {
      if (!theme) return;
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    }

    function fmt(ms) {
      if (!ms) return '--:--';
      const d = new Date(ms);
      return p(d.getHours()) + ':' + p(d.getMinutes());
    }

    function fmtDate(ms) {
      const d = new Date(ms);
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function fmtDateTime(ms) {
      const d = new Date(ms);
      return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }

    function p(n) { return n < 10 ? '0' + n : '' + n; }

    function logError(message) {
      try {
        if (typeof app.sendLog === 'function') {
          app.sendLog({ level: 'error', logger: 'free-slots', data: message });
        } else if (typeof app.log === 'function') {
          app.log({ level: 'error', logger: 'free-slots', data: message });
        }
      } catch {}
    }
  </script>
</body>
</html>
