<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline';
                 script-src 'self' 'unsafe-inline' https://esm.sh;
                 connect-src 'self' https://esm.sh;
                 img-src 'self' data: blob:;
                 style-src 'self' 'unsafe-inline';">
  <style>
    :root {
      color-scheme: light dark;
      --bg: light-dark(#ffffff, #1a1a2e);
      --fg: light-dark(#1f2937, #e5e7eb);
      --title-color: light-dark(#111827, #f9fafb);
      --empty-color: light-dark(#9CA3AF, #6B7280);
      --loading-color: light-dark(#6B7280, #9CA3AF);
      --error-color: light-dark(#EF4444, #FCA5A5);
    }
    html[data-theme="light"] { color-scheme: light; }
    html[data-theme="dark"]  { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--fg);
      padding: 16px;
      -webkit-user-select: none;
      user-select: none;
    }
    .widget-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--title-color); }
    .event-card {
      background: #3B82F6;
      color: white;
      border: 0;
      border-radius: 8px;
      display: block;
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .event-card:hover { box-shadow: 0 4px 16px rgba(59,130,246,0.35); transform: translateY(-1px); }
    .event-card:active { transform: scale(0.98); }
    .event-card:focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }
    .event-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .event-time { font-size: 12px; opacity: 0.85; }
    .event-type { font-size: 11px; opacity: 0.7; margin-top: 2px; }
    .empty-state { text-align: center; padding: 32px 16px; color: var(--empty-color); font-size: 14px; }
    .loading { text-align: center; padding: 24px; color: var(--loading-color); }
    .error { color: var(--error-color); text-align: center; padding: 16px; font-size: 13px; }
    .event-interview { background: #3B82F6; }
    .event-meeting { background: #10B981; }
    .event-reminder { background: #F59E0B; }
    .event-deadline { background: #EF4444; }
    .event-default { background: #6B7280; }
  </style>
</head>
<body>
  <div id="root">
    <div id="title" class="widget-title">日程</div>
    <div id="content" class="loading">加载中...</div>
  </div>
  <script type="module">
    import { App } from 'https://esm.sh/@modelcontextprotocol/ext-apps@1/app-with-deps';

    const app = new App({
      name: 'events-list',
      version: '1.0.0',
      autoResize: true,
    });

    const title = document.getElementById('title');
    const content = document.getElementById('content');
    let lastInput = {};

    app.ontoolinput = (input) => {
      lastInput = input || {};
      updateTitle(lastInput);
    };

    app.ontoolresult = (result) => {
      if (result?.structuredContent?.events) {
        render(result.structuredContent);
      } else {
        renderEmpty('暂无日程安排');
      }
    };

    app.onhostcontextchanged = (ctx) => applyTheme(ctx?.theme);

    await app.connect();
    applyTheme(app.hostContext?.theme);

    function render(data) {
      try {
        const events = data.events || [];
        updateTitle(data.query || lastInput);

        if (!events.length) {
          renderEmpty('当前范围暂无日程安排');
          return;
        }

        content.textContent = '';
        for (const event of events) {
          content.appendChild(createEventCard(event));
        }
      } catch (e) {
        renderError('数据解析失败');
        logError('Render error: ' + e.message);
      }
    }

    function createEventCard(event) {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'event-card event-' + (event.event_type || 'default');
      if (event.color) card.style.background = event.color;
      card.addEventListener('click', () => openEventDetail(event.id));

      const titleEl = document.createElement('div');
      titleEl.className = 'event-title';
      titleEl.textContent = event.title || '未命名事件';

      const timeEl = document.createElement('div');
      timeEl.className = 'event-time';
      timeEl.textContent = fmt(event.start_time) + ' - ' + fmt(event.end_time);

      card.append(titleEl, timeEl);

      if (event.event_type) {
        const typeEl = document.createElement('div');
        typeEl.className = 'event-type';
        typeEl.textContent = tl(event.event_type);
        card.appendChild(typeEl);
      }

      return card;
    }

    async function openEventDetail(eventId) {
      try {
        if (typeof app.callServerTool !== 'function') {
          await fillMessage('请查看事件详情：' + eventId);
          return;
        }

        const result = await app.callServerTool({
          name: 'get_event',
          arguments: { event_id: eventId, return_ui: true },
        });

        if (result?.isError) renderError('无法打开事件详情');
      } catch (e) {
        renderError('无法打开事件详情');
        logError('Open event detail failed: ' + e.message);
      }
    }

    async function fillMessage(text) {
      if (typeof app.sendMessage !== 'function') return;
      await app.sendMessage({
        role: 'user',
        content: [{ type: 'text', text }],
        _meta: { 'codebuddy.ai/sendMessageMode': 'fill' },
      });
    }

    function updateTitle(query) {
      if (query?.start_date && query?.end_date) {
        title.textContent = '日程 ' + fmtDate(query.start_date) + ' - ' + fmtDate(query.end_date);
        return;
      }
      title.textContent = '日程';
    }

    function renderEmpty(message) {
      content.textContent = '';
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = message;
      content.appendChild(empty);
    }

    function renderError(message) {
      content.textContent = '';
      const error = document.createElement('div');
      error.className = 'error';
      error.textContent = message;
      content.appendChild(error);
    }

    function applyTheme(theme) {
      if (!theme) return;
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    }

    function fmt(ms) {
      if (!ms) return '--:--';
      const d = new Date(ms);
      return p(d.getHours()) + ':' + p(d.getMinutes());
    }

    function fmtDate(ms) {
      const d = new Date(ms);
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function p(n) { return n < 10 ? '0' + n : '' + n; }
    function tl(t) { const m = { interview: '面试', meeting: '会议', reminder: '提醒', deadline: '截止', default: '其他' }; return m[t] || t; }

    function logError(message) {
      try {
        if (typeof app.sendLog === 'function') {
          app.sendLog({ level: 'error', logger: 'events-list', data: message });
        } else if (typeof app.log === 'function') {
          app.log({ level: 'error', logger: 'events-list', data: message });
        }
      } catch {}
    }
  </script>
</body>
</html>
