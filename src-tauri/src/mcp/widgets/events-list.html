<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline';
                 script-src 'self' 'unsafe-inline' https://esm.sh;
                 connect-src 'self' https://esm.sh;
                 img-src 'self' data: blob:;
                 style-src 'self' 'unsafe-inline';">
  <style>
    :root {
      color-scheme: light dark;
      --bg: light-dark(#ffffff, #1a1a2e);
      --fg: light-dark(#1f2937, #e5e7eb);
      --title-color: light-dark(#111827, #f9fafb);
      --empty-color: light-dark(#9CA3AF, #6B7280);
      --loading-color: light-dark(#6B7280, #9CA3AF);
      --error-color: light-dark(#EF4444, #FCA5A5);
    }
    html[data-theme="light"] { color-scheme: light; }
    html[data-theme="dark"]  { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--fg);
      padding: 16px;
      -webkit-user-select: none; user-select: none;
    }
    .widget-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--title-color); }
    .event-card {
      background: #3B82F6; color: white; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 8px; cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .event-card:hover { box-shadow: 0 4px 16px rgba(59,130,246,0.35); transform: translateY(-1px); }
    .event-card:active { transform: scale(0.98); }
    .event-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .event-time { font-size: 12px; opacity: 0.85; }
    .event-type { font-size: 11px; opacity: 0.7; margin-top: 2px; }
    .empty-state { text-align: center; padding: 32px 16px; color: var(--empty-color); font-size: 14px; }
    .loading { text-align: center; padding: 24px; color: var(--loading-color); }
    .error { color: var(--error-color); text-align: center; padding: 16px; font-size: 13px; }
    .event-interview { background: #3B82F6; }
    .event-meeting { background: #10B981; }
    .event-reminder { background: #F59E0B; }
    .event-deadline { background: #EF4444; }
    .event-default { background: #6B7280; }
  </style>
</head>
<body>
  <div id="root">
    <div class="widget-title">📅 本周日程</div>
    <div id="content" class="loading">加载中...</div>
  </div>
  <script type="module">
    import { App } from 'https://esm.sh/@modelcontextprotocol/ext-apps@1/app-with-deps';

    const app = new App({
      name: 'events-list',
      version: '1.0.0',
      autoResize: true,
    });

    const content = document.getElementById('content');

    // Host pushes tool result via ontoolresult
    app.ontoolresult = (result) => {
      if (result?.structuredContent?.events) {
        render(result.structuredContent);
      } else {
        content.innerHTML = '<div class="empty-state">🎉 本周暂无日程安排</div>';
      }
    };

    // Theme adaption
    function applyTheme(theme) {
      if (!theme) return;
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    }
    app.onhostcontextchanged = (ctx) => applyTheme(ctx?.theme);

    await app.connect();
    applyTheme(app.hostContext?.theme);

    function render(data) {
      try {
        const events = data.events || [];
        if (!events.length) {
          content.innerHTML = '<div class="empty-state">🎉 本周暂无日程安排</div>';
          return;
        }
        content.innerHTML = '';
        for (let i = 0; i < events.length; i++) {
          const ev = events[i];
          const card = document.createElement('div');
          card.className = 'event-card event-' + (ev.event_type || 'default');
          if (ev.color) card.style.background = ev.color;
          card.innerHTML =
            '<div class="event-title">' + esc(ev.title || '未命名事件') + '</div>' +
            '<div class="event-time">' + fmt(ev.start_time) + ' — ' + fmt(ev.end_time) + '</div>' +
            (ev.event_type ? '<div class="event-type">' + tl(ev.event_type) + '</div>' : '');
          card.addEventListener('click', (function (event) {
            return function () {
              app.uiEvent({ action: 'view_event', data: { event_id: event.id } });
            };
          })(ev));
          content.appendChild(card);
        }
      } catch (e) {
        content.innerHTML = '<div class="error">数据解析失败</div>';
        app.log('error', 'Render error: ' + e.message);
      }
    }

    function fmt(ms) { if (!ms) return '--:--'; const d = new Date(ms); return p(d.getHours()) + ':' + p(d.getMinutes()); }
    function p(n) { return n < 10 ? '0' + n : '' + n; }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function tl(t) { const m = { interview: '面试', meeting: '会议', reminder: '提醒', deadline: '截止', default: '其他' }; return m[t] || t; }
  </script>
</body>
</html>
